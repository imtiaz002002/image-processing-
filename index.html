<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Processing Tool</title>
  <style>
    body { font-family: Arial; text-align: center; }
    canvas { border: 1px solid black; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Image Processing (RGB, HSL, Rotate, Matrix)</h2>

<input type="file" id="upload"><br><br>

<button onclick="applyRGB()">RGB Boost</button>
<button onclick="applyHSL()">HSL Change</button>
<button onclick="rotate()">Rotate</button>
<button onclick="applyMatrix()">Matrix Filter</button>

<br>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img = new Image();

document.getElementById("upload").addEventListener("change", e => {
  const file = e.target.files[0];
  img.src = URL.createObjectURL(file);
});

img.onload = () => {
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
};

// 🔴 RGB Processing
function applyRGB() {
  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    data[i] += 50;     // R
    data[i+1] += 20;   // G
    data[i+2] += 20;   // B
  }

  ctx.putImageData(imageData, 0, 0);
}

// 🎨 HSL Processing
function applyHSL() {
  ctx.filter = "hue-rotate(90deg) saturate(150%)";
  ctx.drawImage(img, 0, 0);
  ctx.filter = "none";
}

// 🔄 Rotation
function rotate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(canvas.width/2, canvas.height/2);
  ctx.rotate(Math.PI / 4);
  ctx.drawImage(img, -img.width/2, -img.height/2);
  ctx.restore();
}

// 🧮 Matrix Filter (Sharpen example)
function applyMatrix() {
  let kernel = [
    0, -1, 0,
   -1, 5, -1,
    0, -1, 0
  ];

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;
  let w = canvas.width;
  let h = canvas.height;
  let output = ctx.createImageData(w, h);

  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      let i = (y*w + x) * 4;

      for (let c = 0; c < 3; c++) {
        let val = 0;
        let k = 0;

        for (let ky = -1; ky <= 1; ky++) {
          for (let kx = -1; kx <= 1; kx++) {
            let ii = ((y+ky)*w + (x+kx))*4 + c;
            val += data[ii] * kernel[k++];
          }
        }

        output.data[i + c] = val;
      }

      output.data[i+3] = 255;
    }
  }

  ctx.putImageData(output, 0, 0);
}
</script>

</body>
</html>
