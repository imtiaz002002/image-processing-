<!DOCTYPE html>
<html>
<head>
  <title>Image Processing Tool</title>
  <style>
    body { font-family: Arial; text-align: center; }
    canvas { border: 1px solid black; margin-top: 10px; }
    input, button { margin: 5px; }
  </style>
</head>
<body>

<h2>Image Processing Tool</h2>

<input type="file" id="upload"><br>

<!-- Controls -->
<div>
  <label>R</label><input type="range" id="r" min="0" max="255" value="0">
  <label>G</label><input type="range" id="g" min="0" max="255" value="0">
  <label>B</label><input type="range" id="b" min="0" max="255" value="0">
</div>

<div>
  <label>Hue</label><input type="range" id="hue" min="0" max="360" value="0">
  <label>Sat</label><input type="range" id="sat" min="0" max="200" value="100">
  <label>Light</label><input type="range" id="light" min="0" max="200" value="100">
</div>

<button onclick="applyRGB()">Apply RGB</button>
<button onclick="applyHSL()">Apply HSL</button>
<button onclick="rotate()">Rotate</button>
<button onclick="applyMatrix()">Matrix</button>
<button onclick="reset()">Reset</button>

<p id="cmyk"></p>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img = new Image();
let originalData;

document.getElementById("upload").onchange = e => {
  img.src = URL.createObjectURL(e.target.files[0]);
};

img.onload = () => {
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
  originalData = ctx.getImageData(0,0,canvas.width,canvas.height);
};

// RGB
function applyRGB(){
  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = imageData.data;

  let r = +document.getElementById("r").value;
  let g = +document.getElementById("g").value;
  let b = +document.getElementById("b").value;

  for(let i=0;i<d.length;i+=4){
    d[i]+=r;
    d[i+1]+=g;
    d[i+2]+=b;

    // CMYK display
    let cmyk = rgbToCmyk(d[i],d[i+1],d[i+2]);
    document.getElementById("cmyk").innerText =
      `C:${cmyk[0].toFixed(2)} M:${cmyk[1].toFixed(2)} Y:${cmyk[2].toFixed(2)} K:${cmyk[3].toFixed(2)}`;
  }

  ctx.putImageData(imageData,0,0);
}

// HSL
function applyHSL(){
  let hue = document.getElementById("hue").value;
  let sat = document.getElementById("sat").value;
  let light = document.getElementById("light").value;

  ctx.filter = `hue-rotate(${hue}deg) saturate(${sat}%) brightness(${light}%)`;
  ctx.drawImage(img,0,0);
  ctx.filter="none";
}

// Transform (rotate)
function rotate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(canvas.width/2,canvas.height/2);
  ctx.rotate(Math.PI/6);
  ctx.drawImage(img,-img.width/2,-img.height/2);
  ctx.restore();
}

// Matrix filter (blur)
function applyMatrix(){
  let kernel = [
    1/9,1/9,1/9,
    1/9,1/9,1/9,
    1/9,1/9,1/9
  ];

  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = imageData.data;
  let w = canvas.width;
  let h = canvas.height;
  let output = ctx.createImageData(w,h);

  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      let i=(y*w+x)*4;

      for(let c=0;c<3;c++){
        let val=0,k=0;

        for(let ky=-1;ky<=1;ky++){
          for(let kx=-1;kx<=1;kx++){
            let ii=((y+ky)*w+(x+kx))*4+c;
            val+=d[ii]*kernel[k++];
          }
        }

        output.data[i+c]=val;
      }

      output.data[i+3]=255;
    }
  }

  ctx.putImageData(output,0,0);
}

// Reset
function reset(){
  ctx.putImageData(originalData,0,0);
}

// RGB → CMYK
function rgbToCmyk(r,g,b){
  let c=1-r/255;
  let m=1-g/255;
  let y=1-b/255;
  let k=Math.min(c,m,y);

  c=(c-k)/(1-k)||0;
  m=(m-k)/(1-k)||0;
  y=(y-k)/(1-k)||0;

  return [c,m,y,k];
}
</script>

</body>
</html>
