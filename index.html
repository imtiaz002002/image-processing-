<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Image Processor</title>
  <style>
    body { font-family: Arial; text-align: center; }
    canvas { border: 1px solid black; margin-top: 10px; }
    button { margin: 5px; }
  </style>
</head>
<body>

<h2>Image Processing Tool</h2>

<input type="file" id="upload"><br><br>

<button onclick="rgb()">RGB Boost</button>
<button onclick="hsl()">HSL</button>
<button onclick="rotate()">Rotate</button>
<button onclick="matrixFilter()">Matrix Filter</button>
<button onclick="showMatrix()">Matrix View</button>

<br>
<canvas id="canvas"></canvas>
<pre id="matrixOutput"></pre>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img = new Image();

document.getElementById("upload").addEventListener("change", e => {
  img.src = URL.createObjectURL(e.target.files[0]);
});

img.onload = () => {
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);
};

// 🔴 RGB
function rgb() {
  let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = imgData.data;

  for (let i=0;i<d.length;i+=4){
    d[i]+=40;     // R
    d[i+1]+=20;   // G
    d[i+2]+=20;   // B
  }

  ctx.putImageData(imgData,0,0);
}

// 🎨 HSL
function hsl() {
  ctx.filter = "hue-rotate(120deg) saturate(140%)";
  ctx.drawImage(img,0,0);
  ctx.filter = "none";
}

// 🔄 Transform (Rotate)
function rotate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.translate(canvas.width/2,canvas.height/2);
  ctx.rotate(Math.PI/6);
  ctx.drawImage(img,-img.width/2,-img.height/2);
  ctx.restore();
}

// 🧮 Matrix Filter (Blur)
function matrixFilter() {
  let kernel = [
    1/9,1/9,1/9,
    1/9,1/9,1/9,
    1/9,1/9,1/9
  ];

  let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imgData.data;
  let w = canvas.width;
  let h = canvas.height;
  let output = ctx.createImageData(w,h);

  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      let i = (y*w+x)*4;

      for(let c=0;c<3;c++){
        let val=0;
        let k=0;

        for(let ky=-1;ky<=1;ky++){
          for(let kx=-1;kx<=1;kx++){
            let ii=((y+ky)*w+(x+kx))*4+c;
            val += data[ii]*kernel[k++];
          }
        }

        output.data[i+c]=val;
      }

      output.data[i+3]=255;
    }
  }

  ctx.putImageData(output,0,0);
}

// 📊 Matrix View (first 10 pixels)
function showMatrix() {
  let imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let d = imgData.data;
  let output = "";

  for(let i=0;i<40;i+=4){
    output += `(${d[i]},${d[i+1]},${d[i+2]})\n`;
  }

  document.getElementById("matrixOutput").textContent = output;
}

// 🟡 CMYK conversion example (console)
function rgbToCmyk(r,g,b){
  let c=1-r/255;
  let m=1-g/255;
  let y=1-b/255;
  let k=Math.min(c,m,y);

  c=(c-k)/(1-k)||0;
  m=(m-k)/(1-k)||0;
  y=(y-k)/(1-k)||0;

  return [c,m,y,k];
}
</script>

</body>
</html>
